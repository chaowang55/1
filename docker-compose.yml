services:
  mysql:
    image: mysql:8.4
    container_name: backend-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: backend
    ports:
      - "3306:3306"
    volumes:
      - backend-db:/var/lib/mysql

  adminer:
    image: adminer
    restart: unless-stopped
    ports:
      - "8081:8080"

volumes:
  backend-db:
